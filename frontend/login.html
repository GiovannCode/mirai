<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirai - Iniciar Sesión</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0b0b;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Ambient Background */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(102, 126, 234, 0.15) 0%, rgba(0,0,0,0) 50%),
                        radial-gradient(circle at 80% 20%, rgba(118, 75, 162, 0.15) 0%, rgba(0,0,0,0) 40%);
            z-index: -1;
            animation: pulseBg 15s infinite alternate;
        }

        @keyframes pulseBg {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .auth-card {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }

        .brand-logo {
            font-weight: 800;
            font-size: 2.5rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 0.5rem;
            display: block;
            text-decoration: none;
        }

        .auth-title {
            text-align: center;
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        .form-control {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: #667eea;
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(102, 126, 234, 0.25);
        }

        .form-control::placeholder {
            color: #6c757d;
        }
        
        .form-floating label {
            color: #6c757d;
        }

        .btn-mirai {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 600;
            width: 100%;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-top: 1rem;
        }

        .btn-mirai:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
            color: white;
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .auth-links {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.95rem;
            color: #a0a0a0;
        }

        .auth-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .auth-links a:hover {
            color: #764ba2;
        }

        #alert-container {
            display: none;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <a href="Usuario.php" class="brand-logo">MIRAI</a>
        <h2 class="auth-title">Inicia sesión en tu cuenta</h2>

        <div id="alert-container" class="alert alert-danger" role="alert">
            <!-- Mensajes de error aquí -->
        </div>

        <form id="login-form">
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                <label for="email">Correo electrónico</label>
            </div>
            
            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="password" placeholder="Password" required>
                <label for="password">Contraseña</label>
            </div>

            <button type="submit" class="btn btn-mirai" id="submit-btn">
                <span class="spinner-border spinner-border-sm d-none" id="spinner" role="status" aria-hidden="true"></span>
                <span>Iniciar Sesión</span>
            </button>
        </form>

        <div class="d-flex align-items-center my-4">
            <hr class="flex-grow-1 border-secondary opacity-25">
            <span class="mx-3 text-secondary" style="font-size: 0.85rem; font-weight: 500;">O continuar con</span>
            <hr class="flex-grow-1 border-secondary opacity-25">
        </div>

        <button type="button" class="btn btn-outline-light w-100" id="google-btn" style="font-weight: 600; border-radius: 12px; padding: 10px; transition: all 0.3s ease;">
            <i class="bi bi-google me-2" style="color: #ea4335;"></i> Google
        </button>

        <div class="auth-links">
            ¿No tienes una cuenta? <a href="register.html">Regístrate ahora</a>
        </div>
    </div>

    <!-- Firebase Auth Logic -->
    <script type="module">
        import { auth } from './firebase-config.js';
        import { signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        const loginForm = document.getElementById('login-form');
        const alertContainer = document.getElementById('alert-container');
        const submitBtn = document.getElementById('submit-btn');
        const spinner = document.getElementById('spinner');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Loading state
            submitBtn.disabled = true;
            spinner.classList.remove('d-none');
            alertContainer.style.display = 'none';

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                // Sesión iniciada exitosamente, redirigir al inicio
                window.location.href = 'index.html';
            } catch (error) {
                console.error("Error signing in:", error);
                let errorMsg = 'Error al iniciar sesión. Intenta nuevamente.';
                
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                    errorMsg = 'Correo o contraseña incorrectos.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMsg = 'El formato del correo es inválido.';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMsg = 'Demasiados intentos fallidos. Intenta más tarde.';
                }

                alertContainer.textContent = errorMsg;
                alertContainer.style.display = 'block';
            } finally {
                // Restore state
                submitBtn.disabled = false;
                spinner.classList.add('d-none');
            }
        });

        // Google Auth
        const googleBtn = document.getElementById('google-btn');
        const provider = new GoogleAuthProvider();

        googleBtn.addEventListener('click', async () => {
            alertContainer.style.display = 'none';
            googleBtn.disabled = true;

            try {
                await signInWithPopup(auth, provider);
                window.location.href = 'index.html';
            } catch (error) {
                console.error("Error signing in with Google:", error);
                let errorMsg = 'Error al iniciar sesión con Google. Intenta nuevamente.';
                if (error.code === 'auth/popup-closed-by-user') {
                    errorMsg = 'Inicio de sesión cancelado.';
                }
                alertContainer.textContent = errorMsg;
                alertContainer.style.display = 'block';
            } finally {
                googleBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
